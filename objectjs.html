<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSc</title>
</head>
<body>
    <h2>Java Script</h2>
    <script>
        // variable declaration in JS using var keyword 
        var myNAME="ABES";
        document.write(myNAME);
        console.log(myNAME);
        console.log(typeof(myNAME));

        function hello(){
            var msg="Demo";
            console.log(msg);
        }
        hello();

        let msg="Welcome to ABES";
        console.log(msg);

        // JS variable data types
        //primitive - string, number, boolean, undefined, symb

        //string
        let name="ABES";
        console.log(name);
        console.log(typeof(name));

        //number
        let myCount = 9949893938949;
        console.log(myCount)
        console.log(typeof(myCount));

        // Boolean
        let courseDone = false;
        console.log(courseDone);
        console.log(typeof(courseDone));


        //Null
        let add = null;
        console.log(null);
        console.log(typeof(null));

        //Undefined
        let email;
        console.log(email);
        console.log(typeof(email));

        //Bigint
        let bigAmount = BigInt("934784835384099309039493");
        console.log(bigAmount);
        console.log(typeof(bigAmount));
        let val1 = Symbol('hello');
        let val2 = Symbol('Hello');
        console.log(val1==val2);
        console.log(typeof(val1));
        //object {} - it is a collection of keys(property) and its value
        
        //create object - literal {} and new keyword
        //create object for student    
        
        let student = {
            name: "Atharva",
            ismarried: false,
            address: {
                streetNo: "KG-13",
                area: "kavi nagar",
                pincode: 201014,
                dst: "Ghaziabad"
            },
            id: 2503215300025,
            getInfo: function(){
                return "my details are " + this.id + " and " + this.name;
            },
            examDone: null
        };
        // console.log(myinfo);
        // console.log(myinfo.email);

        let num = [1,2,3,4,5,6];
        console.log(num[0]);
        
        console.log(student);
        console.log(student.address);
        console.log(typeof(student));

        //access object's properties/keys
        console.log(student.getInfo());

        console.log('id' in student);
        console.log(delete student.ismarried);

        let studentKeys = Object.keys(student);
        console.log(studentKeys.length);
        for (let i = 0; i < studentKeys.length; i++){
            console.log(student[studentKeys[i]]);
        }

        for (let x in student){
            console.log(student[x]);
        }

        // create object using 'new' keyword
        let myinfo=new Object();
        myinfo.name="ANSH";
        myinfo.age=18;
        myinfo.height=194;
        //access objects property using [] nototation
        console.log(myinfo['age']);

    </script>
</body>
</html>
